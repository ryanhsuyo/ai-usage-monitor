<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111820"/>
      <stop offset="1" stop-color="#18232c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35b6a3"/>
      <stop offset="1" stop-color="#5c82ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="760" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="760" height="5" fill="url(#accent)"/>

  <text x="380" y="50" fill="#f4f7fa" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="23" font-weight="700" text-anchor="middle">安裝 AI Usage Monitor</text>
  <text x="380" y="77" fill="#9eabb7" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" text-anchor="middle">將 App 拖曳到 Applications 資料夾</text>

  <path d="M285 183 H445" fill="none" stroke="#40b4a7" stroke-width="4" stroke-linecap="round"/>
  <path d="M431 169 L447 183 L431 197" fill="none" stroke="#40b4a7" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="380" cy="183" r="25" fill="#162a2c" stroke="#287c75"/>
  <text x="380" y="189" fill="#74d9cc" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="17" font-weight="700" text-anchor="middle">拖曳</text>

  <g filter="url(#shadow)">
    <rect x="40" y="305" width="680" height="158" rx="18" fill="#1d2831" stroke="#34434e"/>
  </g>
  <circle cx="76" cy="344" r="17" fill="#d99a3e"/>
  <text x="76" y="350" fill="#111820" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18" font-weight="800" text-anchor="middle">!</text>
  <text x="108" y="339" fill="#f4f7fa" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="16" font-weight="700">首次開啟若被 macOS 阻擋</text>
  <text x="108" y="364" fill="#b7c2cb" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13">前往「系統設定 → 隱私權與安全性」</text>

  <rect x="108" y="383" width="168" height="38" rx="10" fill="#2d8077"/>
  <text x="192" y="408" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14" font-weight="700" text-anchor="middle">點擊「仍要打開」</text>
  <text x="294" y="398" fill="#8f9da9" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12">Open System Settings → Privacy &amp; Security</text>
  <text x="294" y="416" fill="#8f9da9" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12">then choose “Open Anyway”.</text>

  <text x="380" y="486" fill="#657480" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" text-anchor="middle">未簽章測試版本 · macOS 的安全確認必須由使用者親自完成</text>
</svg>
